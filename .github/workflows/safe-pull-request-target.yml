name: "POC Safe: pull_request_target metadata only"

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  metadata-only:
    runs-on: ubuntu-latest
    steps:
      - name: Show safe target shape
        run: |
          {
            echo "## Safe pull_request_target shape"
            echo
            echo "- Event: ${{ github.event_name }}"
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- Head repo: ${{ github.event.pull_request.head.repo.full_name }}"
            echo "- Head SHA: ${{ github.event.pull_request.head.sha }}"
            echo
            echo "This workflow has target-repository authority, but it never checks out or executes fork PR code."
          } >> "$GITHUB_STEP_SUMMARY"

