name: "POC Vulnerable: pull_request_target runs PR code"

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  vulnerable:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout attacker-controlled PR code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run npm install in privileged target context
        env:
          POC_FAKE_SECRET: ${{ secrets.POC_FAKE_SECRET }}
          POC_PROOF_DIR: .poc-proof
        run: npm install --ignore-scripts=false --fund=false --audit=false

      - name: Print proof
        if: always()
        run: |
          {
            echo "## Vulnerable pull_request_target proof"
            echo
            echo "This workflow checked out the fork PR head and ran npm install in the target-repository context."
            echo
            if [ -f .poc-proof/proof.json ]; then
              echo '```json'
              cat .poc-proof/proof.json
              echo '```'
            else
              echo "No attacker proof file was created. The PR may not include the payload yet."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerable-pull-request-target-proof
          path: .poc-proof/
          if-no-files-found: ignore

