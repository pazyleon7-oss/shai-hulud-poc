name: "PR CI"

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        env:
          POC_PROOF_DIR: .poc-proof
        run: npm install --ignore-scripts=false --fund=false --audit=false

      - name: Run tests
        run: npm test

      - name: Write report
        if: always()
        run: |
          {
            echo "## PR CI report"
            echo
            if [ -f .poc-proof/proof.json ]; then
              echo "Payload proof found:"
              echo
              echo '```json'
              cat .poc-proof/proof.json
              echo '```'
            else
              echo "No payload proof file was found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-ci-report
          path: .poc-proof/
          if-no-files-found: ignore

