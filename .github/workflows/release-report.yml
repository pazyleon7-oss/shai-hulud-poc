name: "Release Report"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Restore dependency cache
        id: dependency-cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-left-pad-v1

      - name: Install dependencies when cache is missing
        if: steps.dependency-cache.outputs.cache-hit != 'true'
        run: npm install --ignore-scripts --fund=false --audit=false

      - name: Run release notes
        env:
          POC_PROOF_DIR: .poc-proof
        run: npm run release:notes

      - name: Write release summary
        if: always()
        run: |
          {
            echo "## Release report"
            echo
            echo "This workflow simulates a trusted release/reporting job that consumes cached node_modules."
            echo
            if [ -f .poc-proof/release-proof.json ]; then
              echo "Release proof:"
              echo
              echo '```json'
              cat .poc-proof/release-proof.json
              echo '```'
            elif [ -f .poc-proof/base-release-report.json ]; then
              echo "Base release report:"
              echo
              echo '```json'
              cat .poc-proof/base-release-report.json
              echo '```'
            else
              echo "No release proof file was found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-report
          path: .poc-proof/
          include-hidden-files: true
          if-no-files-found: ignore
