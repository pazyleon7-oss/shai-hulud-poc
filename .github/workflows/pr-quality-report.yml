name: "PR Quality Report"

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  quality-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request changes
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Compute dependency cache key
        id: dependency-cache-key
        run: |
          lock_hash="$(sha256sum package-lock.json | cut -d ' ' -f 1)"
          echo "value=node-modules-${{ runner.os }}-${lock_hash}" >> "$GITHUB_OUTPUT"

      - name: Restore dependency cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ steps.dependency-cache-key.outputs.value }}

      - name: Install dependencies
        env:
          POC_PROOF_DIR: .poc-proof
        run: npm install --ignore-scripts=false --fund=false --audit=false

      - name: Run quality checks
        run: npm test

      - name: Write report
        if: always()
        run: |
          {
            echo "## PR quality report"
            echo
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- Head repo: ${{ github.event.pull_request.head.repo.full_name }}"
            echo "- Head SHA: ${{ github.event.pull_request.head.sha }}"
            echo "- Cache key: ${{ steps.dependency-cache-key.outputs.value }}"
            echo
            if [ -f .poc-proof/proof.json ]; then
              echo "Payload proof found:"
              echo
              echo '```json'
              cat .poc-proof/proof.json
              echo '```'
            else
              echo "No payload proof file was found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload quality report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-quality-report
          path: .poc-proof/
          include-hidden-files: true
          if-no-files-found: ignore
